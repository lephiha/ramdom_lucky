<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vòng quay may mắn</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>Vòng quay may mắn</h1>
      <p>Tosy Robotics - Random Selection System</p>
      <p style="color:var(--accent2);font-size:22px;margin-top:4px;letter-spacing:2px;font-style: bold;">The Liems - Tuyệt đối minh bạch</p>
    </div>

    <!-- Cột trái -->
    <div class="panel" id="panelMembers">
      <div class="panel-title">
        Danh sách thành viên (<span id="memberCount">0</span>)
        <span id="remainingBadge"></span>
      </div>

      <div class="member-grid" id="memberGrid"></div>

      <div class="add-form">
        <div class="panel-title">Thêm thành viên mới</div>
        <div class="form-row">
          <input class="form-input" id="inputName"  placeholder="Họ Tên" />
          <input class="form-input" id="inputRole"  placeholder="Chức vụ" />
        </div>
        <div class="form-row">
          <input class="form-input" id="inputEmoji" placeholder="Viết tắt (vd: MK)" maxlength="3" />
          <input class="form-input" id="inputColor" type="color" value="#00e5ff" />
        </div>
        <button class="btn-add" onclick="addMember()">+ Thêm vào phòng ban</button>
      </div>
    </div>

    <!-- Cột phải -->
    <div class="spin-panel">

      <div class="slot-machine">
        <div class="slot-label">Vòng quay ngẫu nhiên</div>
        <div class="slot-display" id="slotDisplay">
          <div class="slot-idle">
            <div class="slot-idle-icon"></div>
            <div class="slot-idle-text">Sẵn sàng</div>
          </div>
        </div>
        <button class="spin-btn" id="spinBtn" onclick="startSpin()"> QUAY NGAY</button>
        <div style="text-align:center; margin-top:10px">
          <button class="skip-btn" id="skipBtn" onclick="skipReveal()" style="display:none">
            reveal ngay →
          </button>
        </div>
      </div>

      <div class="stats-panel">
        <div class="stat">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Tổng lượt</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statRemaining" style="color:var(--accent3)">15</div>
          <div class="stat-label">Còn lại</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statUnique" style="color:var(--accent2)">0</div>
          <div class="stat-label">Đã chọn</div>
        </div>
      </div>

      <div class="history-panel">
        <div class="panel-title">Lịch sử quay</div>
        <div class="history-list" id="historyList">
          <div class="empty-hint">Chưa có lượt quay nào</div>
        </div>
      </div>

      <button class="btn-reset" onclick="resetAll()">🔄 Reset</button>
      
      <div class="settings-panel">
        <div class="panel-title">// Cài đặt</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
          <label style="font-size:11px;color:var(--muted)">Số lượt quay</label>
          <div style="display:flex;align-items:center;gap:8px">
            <button onclick="changeTotalSpins(-1)" style="background:var(--surface);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px">−</button>
            <span id="totalSpinsDisplay" style="font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;min-width:24px;text-align:center">15</span>
            <button onclick="changeTotalSpins(1)" style="background:var(--surface);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px">+</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
          <label style="font-size:11px;color:var(--muted)">Chế độ sáng</label>
          <div class="toggle" id="themeToggle" onclick="toggleTheme()">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <button id="toggleListBtn" onclick="toggleList()" style="
  position: fixed;
  top: 16px;
  left: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--accent3);
  font-size: 10px;
  font-family: 'Unbounded', sans-serif;
  padding: 6px 12px;
  cursor: pointer;
  z-index: 100;
  letter-spacing: 1px;
">☰ ẨN DS</button>
  <script src="app.js"></script>
</body>
</html>
